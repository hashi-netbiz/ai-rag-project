name: Deploy

on:
  push:
    branches: [master]

permissions:
  contents: read
  security-events: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  BACKEND_IMAGE: 891612574910.dkr.ecr.us-east-1.amazonaws.com/hashi-netbiz/ai-rag-project/backend
  FRONTEND_IMAGE: 891612574910.dkr.ecr.us-east-1.amazonaws.com/hashi-netbiz/ai-rag-project/frontend

jobs:

  # ── [1] Path change detection ────────────────────────────────────────────
  changes:
    name: Detect file changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'Dockerfile.backend'
              - 'backend/**'
              - '.github/workflows/deploy.yml'
            frontend:
              - 'Dockerfile.frontend'
              - 'frontend-next/**'
              - '.github/workflows/deploy.yml'

  # ── [2] E2E regression tests ──────────────────────────────────────────────
  e2e:
    name: E2E regression tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
      - name: Write .env
        run: |
          cat > backend/.env << 'EOF'
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
          PINECONE_API_KEY=${{ secrets.PINECONE_API_KEY }}
          PINECONE_INDEX_NAME=${{ secrets.PINECONE_INDEX_NAME }}
          JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
          JWT_ALGORITHM=HS256
          JWT_EXPIRE_MINUTES=60
          LANGCHAIN_API_KEY=${{ secrets.LANGCHAIN_API_KEY }}
          LANGCHAIN_TRACING_V2=false
          LANGCHAIN_PROJECT=rag-rbac-chatbot
          EOF
      - name: Build and start stack
        run: docker compose up -d --build
        env:
          BUILDX_GHA_CACHE_FROM: type=gha
          BUILDX_GHA_CACHE_TO: type=gha,mode=max
      - name: Wait for backend healthy
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health && echo && break || sleep 5
          done
      - name: Wait for frontend healthy
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3001 > /dev/null && break || sleep 5
          done
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend-next/package-lock.json
      - name: Install frontend deps (required for TypeScript section of E2E)
        run: npm ci
        working-directory: frontend-next
      - name: Run E2E regression suite
        run: bash test_e2e.sh
      - name: Dump stack logs
        if: failure()
        run: docker compose logs
      - name: Tear down stack
        if: always()
        run: docker compose down

  # ── [3] Docker push to ECR ────────────────────────────────────────────────
  docker-push:
    name: Push to Amazon ECR
    runs-on: ubuntu-latest
    needs: [e2e, changes]
    if: |
      needs.e2e.result == 'success' &&
      (needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true')
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::891612574910:role/github-actions
          aws-region: us-east-1
      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push backend
        if: needs.changes.outputs.backend == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:sha-${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:staging-latest
            ${{ env.BACKEND_IMAGE }}:v1.${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build and push frontend
        if: needs.changes.outputs.frontend == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:sha-${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:staging-latest
            ${{ env.FRONTEND_IMAGE }}:v1.${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── [4] DAST ──────────────────────────────────────────────────────────────
  dast:
    name: OWASP ZAP DAST
    runs-on: ubuntu-latest
    needs: e2e
    if: needs.e2e.result == 'success'
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
      - name: Write .env for docker compose
        run: |
          cat > backend/.env << 'EOF'
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
          PINECONE_API_KEY=${{ secrets.PINECONE_API_KEY }}
          PINECONE_INDEX_NAME=${{ secrets.PINECONE_INDEX_NAME }}
          JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
          JWT_ALGORITHM=HS256
          JWT_EXPIRE_MINUTES=60
          LANGCHAIN_API_KEY=${{ secrets.LANGCHAIN_API_KEY }}
          LANGCHAIN_TRACING_V2=true
          LANGCHAIN_PROJECT=rag-rbac-chatbot
          EOF
      - name: Build and start stack
        run: docker compose up -d --build
        env:
          BUILDX_GHA_CACHE_FROM: type=gha
          BUILDX_GHA_CACHE_TO: type=gha,mode=max
      - name: Wait for backend health
        run: |
          for i in $(seq 1 30); do
            python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" 2>/dev/null && break || sleep 5
          done
      - name: ZAP scan — frontend
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: http://localhost:3001
          fail_action: false
          token: ${{ secrets.GITHUB_TOKEN }}
          artifact_name: zap-frontend
      - name: ZAP scan — backend API
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: http://localhost:8000
          fail_action: false
          token: ${{ secrets.GITHUB_TOKEN }}
          artifact_name: zap-backend
      - name: Tear down stack
        if: always()
        run: docker compose down

  # ── [5] GitOps update ─────────────────────────────────────────────────────
  gitops-update:
    name: GitOps update
    runs-on: ubuntu-latest
    needs: [docker-push, dast, changes]
    if: |
      needs.docker-push.result == 'success' &&
      (needs.dast.result == 'success' || needs.dast.result == 'skipped')
    steps:
      - name: Install kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/
      - uses: actions/checkout@v5
        with:
          repository: ${{ secrets.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops-repo
      - name: Update staging image tags
        run: |
          cd gitops-repo/k8s/staging
          if [ "${{ needs.changes.outputs.backend }}" == "true" ]; then
            kustomize edit set image ${{ env.BACKEND_IMAGE }}=${{ env.BACKEND_IMAGE }}:sha-${{ github.sha }}
          fi
          if [ "${{ needs.changes.outputs.frontend }}" == "true" ]; then
            kustomize edit set image ${{ env.FRONTEND_IMAGE }}=${{ env.FRONTEND_IMAGE }}:sha-${{ github.sha }}
          fi
      - name: Commit and push
        run: |
          cd gitops-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "chore: update staging to sha-${{ github.sha }} [skip ci]" && git push
