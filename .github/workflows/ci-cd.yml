name: CI/CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master]

permissions:
  contents: read
  security-events: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  BACKEND_IMAGE: 891612574910.dkr.ecr.us-east-1.amazonaws.com/hashi-netbiz/ai-rag-project/backend
  FRONTEND_IMAGE: 891612574910.dkr.ecr.us-east-1.amazonaws.com/hashi-netbiz/ai-rag-project/frontend

jobs:

  # ── [1] Secret scanning — fail fast gate ─────────────────────────────────
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── [1b] Path change detection ───────────────────────────────────────────
  changes:
    name: Detect file changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'Dockerfile.backend'
              - 'backend/**'
            frontend:
              - 'Dockerfile.frontend'
              - 'frontend-next/**'

  # ── [2a] SAST ─────────────────────────────────────────────────────────────
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs: gitleaks
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v7
      - name: Install dev deps
        run: uv sync --frozen --group dev
        working-directory: backend
      - name: Run tests with coverage
        run: uv run pytest tests/ --cov=app --cov-report=xml
        working-directory: backend
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          PINECONE_INDEX_NAME: ${{ secrets.PINECONE_INDEX_NAME }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          LANGCHAIN_API_KEY: ${{ secrets.LANGCHAIN_API_KEY }}
          LANGCHAIN_TRACING_V2: "false"
          LANGCHAIN_PROJECT: test
      - name: Fix coverage paths for SonarCloud
        run: |
          sed -i 's|<source>.*</source>|<source>.</source>|' backend/coverage.xml
          sed -i 's|filename="|filename="backend/app/|g' backend/coverage.xml
      - uses: SonarSource/sonarcloud-github-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ── [2b] SCA ──────────────────────────────────────────────────────────────
  sca:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest
    needs: gitleaks
    steps:
      - uses: actions/checkout@v5
      - uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "rag-rbac-chatbot"
          path: "."
          format: "HTML"
          out: "dependency-check-report"
          args: >
            --enableRetired
            --scan backend/pyproject.toml
            --scan frontend-next/package-lock.json
            --failOnCVSS 7
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: dependency-check-report
          path: dependency-check-report/
          retention-days: 30

  # ── [2c] Unit tests ───────────────────────────────────────────────────────
  unit-tests:
    name: Backend unit tests
    runs-on: ubuntu-latest
    needs: gitleaks
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v7
      - name: Install dev deps
        run: uv sync --frozen --group dev
        working-directory: backend
      - name: Run tests
        run: uv run pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing
        working-directory: backend
        env:
          GROQ_API_KEY: test
          GOOGLE_API_KEY: test
          PINECONE_API_KEY: test
          PINECONE_INDEX_NAME: test
          JWT_SECRET_KEY: test-secret-key-32-chars-minimum!!
          JWT_ALGORITHM: HS256
          JWT_EXPIRE_MINUTES: "60"
          LANGCHAIN_API_KEY: test
          LANGCHAIN_TRACING_V2: "false"
          LANGCHAIN_PROJECT: test
      - uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: backend/coverage.xml

  # ── [2d] Frontend lint & typecheck ────────────────────────────────────────
  lint-and-typecheck:
    name: Frontend lint & typecheck
    runs-on: ubuntu-latest
    needs: gitleaks
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend-next/package-lock.json
      - name: Install deps
        run: npm ci
        working-directory: frontend-next
      - name: Type check
        run: npm run type-check
        working-directory: frontend-next
      - name: Lint
        run: npm run lint
        working-directory: frontend-next

  # ── [3] Docker build ──────────────────────────────────────────────────────
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [sonarcloud, sca, unit-tests, lint-and-typecheck, changes]
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
      - name: Build backend image
        if: needs.changes.outputs.backend == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.backend
          push: false
          tags: rag-backend:ci
          outputs: type=docker,dest=/tmp/backend-image.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build frontend image
        if: needs.changes.outputs.frontend == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.frontend
          build-args: FASTAPI_BASE_URL=http://backend:8000
          push: false
          tags: rag-frontend:ci
          outputs: type=docker,dest=/tmp/frontend-image.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: actions/upload-artifact@v6
        if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true'
        with:
          name: docker-images
          path: /tmp/*.tar
          retention-days: 1

  # ── [4] Container scan ────────────────────────────────────────────────────
  trivy:
    name: Trivy container scan
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v7
        with:
          name: docker-images
          path: /tmp
      - name: Load images
        run: |
          docker load --input /tmp/backend-image.tar
          docker load --input /tmp/frontend-image.tar
      - name: Scan backend image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: rag-backend:ci
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: .trivyignore
          exit-code: 0
          format: sarif
          output: trivy-backend.sarif
      - name: Scan frontend image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: rag-frontend:ci
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: .trivyignore
          exit-code: 0
          format: sarif
          output: trivy-frontend.sarif
      - name: Upload backend SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend
      - name: Upload frontend SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend

  # ── [5] E2E regression tests ──────────────────────────────────────────────
  e2e:
    name: E2E regression tests
    runs-on: ubuntu-latest
    needs: trivy
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
      - name: Write .env
        run: |
          cat > backend/.env << 'EOF'
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
          PINECONE_API_KEY=${{ secrets.PINECONE_API_KEY }}
          PINECONE_INDEX_NAME=${{ secrets.PINECONE_INDEX_NAME }}
          JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
          JWT_ALGORITHM=HS256
          JWT_EXPIRE_MINUTES=60
          LANGCHAIN_API_KEY=${{ secrets.LANGCHAIN_API_KEY }}
          LANGCHAIN_TRACING_V2=false
          LANGCHAIN_PROJECT=rag-rbac-chatbot
          EOF
      - name: Build and start stack
        run: docker compose up -d --build
        env:
          BUILDX_GHA_CACHE_FROM: type=gha
          BUILDX_GHA_CACHE_TO: type=gha,mode=max
      - name: Wait for backend healthy
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health && echo && break || sleep 5
          done
      - name: Wait for frontend healthy
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3001 > /dev/null && break || sleep 5
          done
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend-next/package-lock.json
      - name: Install frontend deps (required for TypeScript section of E2E)
        run: npm ci
        working-directory: frontend-next
      - name: Run E2E regression suite
        run: bash test_e2e.sh
      - name: Dump stack logs
        if: failure()
        run: docker compose logs
      - name: Tear down stack
        if: always()
        run: docker compose down

  # ── [6] Docker push (master only, lets go) ─────────────────────────────────────────
  docker-push:
    name: Push to Amazon ECR
    runs-on: ubuntu-latest
    needs: [trivy, e2e, changes]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::891612574910:role/github-actions
          aws-region: us-east-1
      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Push backend
        if: needs.changes.outputs.backend == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:v1.${{ github.run_number }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
      - name: Push frontend
        if: needs.changes.outputs.frontend == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.frontend
          build-args: FASTAPI_BASE_URL=http://backend:8000
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:v1.${{ github.run_number }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha

  # ── [7] DAST (master only) ────────────────────────────────────────────────
  dast:
    name: OWASP ZAP DAST
    runs-on: ubuntu-latest
    needs: [trivy, e2e]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v7
        with:
          name: docker-images
          path: /tmp
      - name: Load images
        run: |
          docker load --input /tmp/backend-image.tar
          docker load --input /tmp/frontend-image.tar
      - name: Write .env for docker compose
        run: |
          cat > backend/.env << 'EOF'
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
          PINECONE_API_KEY=${{ secrets.PINECONE_API_KEY }}
          PINECONE_INDEX_NAME=${{ secrets.PINECONE_INDEX_NAME }}
          JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
          JWT_ALGORITHM=HS256
          JWT_EXPIRE_MINUTES=60
          LANGCHAIN_API_KEY=${{ secrets.LANGCHAIN_API_KEY }}
          LANGCHAIN_TRACING_V2=true
          LANGCHAIN_PROJECT=rag-rbac-chatbot
          EOF
      - name: Start stack
        run: docker compose up -d
      - name: Wait for backend health
        run: |
          for i in $(seq 1 30); do
            python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" 2>/dev/null && break || sleep 5
          done
      - name: ZAP scan — frontend
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: http://localhost:3001
          fail_action: false
          token: ${{ secrets.GITHUB_TOKEN }}
          artifact_name: zap-frontend
      - name: ZAP scan — backend API
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: http://localhost:8000
          fail_action: false
          token: ${{ secrets.GITHUB_TOKEN }}
          artifact_name: zap-backend
      - name: Tear down stack
        if: always()
        run: docker compose down

  # ── [8] GitOps update (master only, stub) ─────────────────────────────────
  gitops-update:
    name: GitOps update
    runs-on: ubuntu-latest
    needs: [docker-push, dast]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v5
        with:
          repository: ${{ secrets.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops-repo
      - name: Update image tags
        run: |
          cd gitops-repo
          # kustomize: kustomize edit set image rag-backend=${{ env.BACKEND_IMAGE }}:v1.${{ github.run_number }}
          # sed: sed -i "s|rag-backend:.*|rag-backend:v1.${{ github.run_number }}|" manifests/deployment.yaml
          echo "TODO: fill in manifest update command"
      - name: Commit and push
        run: |
          cd gitops-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "chore: update rag images to ${{ github.sha }}"
          git push
