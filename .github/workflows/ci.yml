name: CI

on:
  pull_request:
    branches: [master]

permissions:
  contents: read
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  BACKEND_IMAGE: 891612574910.dkr.ecr.us-east-1.amazonaws.com/hashi-netbiz/ai-rag-project/backend
  FRONTEND_IMAGE: 891612574910.dkr.ecr.us-east-1.amazonaws.com/hashi-netbiz/ai-rag-project/frontend

jobs:

  # ── [1] Secret scanning — fail fast gate ─────────────────────────────────
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── [1b] Path change detection ───────────────────────────────────────────
  changes:
    name: Detect file changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'Dockerfile.backend'
              - 'backend/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'Dockerfile.frontend'
              - 'frontend-next/**'
              - '.github/workflows/ci.yml'

  # ── [2a] SAST ─────────────────────────────────────────────────────────────
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs: gitleaks
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v7
      - name: Install dev deps
        run: uv sync --frozen --group dev
        working-directory: backend
      - name: Run tests with coverage
        run: uv run pytest tests/ --cov=app --cov-report=xml
        working-directory: backend
        env:
          GROQ_API_KEY: test
          GOOGLE_API_KEY: test
          PINECONE_API_KEY: test
          PINECONE_INDEX_NAME: test
          JWT_SECRET_KEY: test-secret-key-32-chars-minimum!!
          JWT_ALGORITHM: HS256
          JWT_EXPIRE_MINUTES: "60"
          LANGCHAIN_API_KEY: test
          LANGCHAIN_TRACING_V2: "false"
          LANGCHAIN_PROJECT: test
      - name: Fix coverage paths for SonarCloud
        run: |
          sed -i 's|<source>.*</source>|<source>.</source>|' backend/coverage.xml
          sed -i 's|filename="|filename="backend/app/|g' backend/coverage.xml
      - uses: SonarSource/sonarcloud-github-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ── [2b] SCA ──────────────────────────────────────────────────────────────
  sca:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest
    needs: gitleaks
    steps:
      - uses: actions/checkout@v5
      - uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "rag-rbac-chatbot"
          path: "."
          format: "HTML"
          out: "dependency-check-report"
          args: >
            --enableRetired
            --scan backend/pyproject.toml
            --scan frontend-next/package-lock.json
            --failOnCVSS 7
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: dependency-check-report
          path: dependency-check-report/
          retention-days: 30

  # ── [2c] Unit tests ───────────────────────────────────────────────────────
  unit-tests:
    name: Backend unit tests
    runs-on: ubuntu-latest
    needs: gitleaks
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v7
      - name: Install dev deps
        run: uv sync --frozen --group dev
        working-directory: backend
      - name: Run tests
        run: uv run pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing
        working-directory: backend
        env:
          GROQ_API_KEY: test
          GOOGLE_API_KEY: test
          PINECONE_API_KEY: test
          PINECONE_INDEX_NAME: test
          JWT_SECRET_KEY: test-secret-key-32-chars-minimum!!
          JWT_ALGORITHM: HS256
          JWT_EXPIRE_MINUTES: "60"
          LANGCHAIN_API_KEY: test
          LANGCHAIN_TRACING_V2: "false"
          LANGCHAIN_PROJECT: test
      - uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: backend/coverage.xml

  # ── [2d] Frontend lint & typecheck ────────────────────────────────────────
  lint-and-typecheck:
    name: Frontend lint & typecheck
    runs-on: ubuntu-latest
    needs: gitleaks
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend-next/package-lock.json
      - name: Install deps
        run: npm ci
        working-directory: frontend-next
      - name: Type check
        run: npm run type-check
        working-directory: frontend-next
      - name: Lint
        run: npm run lint
        working-directory: frontend-next

  # ── [3] Docker build (no push) ────────────────────────────────────────────
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [sonarcloud, sca, unit-tests, lint-and-typecheck, changes]
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
      - name: Build backend image
        if: needs.changes.outputs.backend == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.backend
          push: false
          tags: ${{ env.BACKEND_IMAGE }}:sha-${{ github.sha }}
          outputs: type=docker,dest=/tmp/backend-image.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build frontend image
        if: needs.changes.outputs.frontend == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.frontend
          push: false
          tags: ${{ env.FRONTEND_IMAGE }}:sha-${{ github.sha }}
          outputs: type=docker,dest=/tmp/frontend-image.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: actions/upload-artifact@v6
        if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true'
        with:
          name: docker-images
          path: /tmp/*.tar
          retention-days: 1

  # ── [4] Container scan ────────────────────────────────────────────────────
  trivy:
    name: Trivy container scan
    runs-on: ubuntu-latest
    needs: [docker-build, changes]
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v7
        with:
          name: docker-images
          path: /tmp
      - name: Load backend image
        if: needs.changes.outputs.backend == 'true'
        run: docker load --input /tmp/backend-image.tar
      - name: Load frontend image
        if: needs.changes.outputs.frontend == 'true'
        run: docker load --input /tmp/frontend-image.tar
      - name: Scan backend image
        if: needs.changes.outputs.backend == 'true'
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.BACKEND_IMAGE }}:sha-${{ github.sha }}
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: .trivyignore
          exit-code: 0
          format: sarif
          output: trivy-backend.sarif
      - name: Scan frontend image
        if: needs.changes.outputs.frontend == 'true'
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.FRONTEND_IMAGE }}:sha-${{ github.sha }}
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: .trivyignore
          exit-code: 0
          format: sarif
          output: trivy-frontend.sarif
      - name: Upload backend SARIF
        if: needs.changes.outputs.backend == 'true'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend
      - name: Upload frontend SARIF
        if: needs.changes.outputs.frontend == 'true'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend
